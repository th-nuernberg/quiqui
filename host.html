<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuiQui — Host</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="katex.min.css" />
</head>
<body>

  <div class="page-wrap">
    <header class="top-bar">
      <a href="https://github.com/th-nuernberg/quiqui" target="_blank" rel="noopener" title="QuiQui on GitHub"><img src="quiqui-logo.png" alt="QuiQui" class="logo" id="logo" /></a>
      <span class="top-bar-role">Host View</span>
      <span class="connection-indicator" id="connection-indicator" title="Disconnected — reconnecting…"></span>
      <a class="top-bar-help" href="https://github.com/th-nuernberg/quiqui/blob/main/QUICKSTART.md" target="_blank" rel="noopener">Help</a>
    </header>

    <main>

      <!-- Repo + file selection -->
      <section class="card" id="section-repo">
        <div class="section-label">Select public GitHub repo with question files</div>
        <div class="file-row">
          <input type="text" id="repo-url" value="__DEFAULT_REPO_URL__" />
          <button class="btn-primary" id="btn-pull" title="Download question files from repository, refresh at anytime.">
            <span class="icon">↻</span> Load questions
          </button>
        </div>
        <div class="file-row" id="file-row" style="margin-top: 10px; display:none;">
          <select id="file-select">
            <option value="">— select a question file —</option>
          </select>
        </div>
        <div class="meta-line" id="pull-status"></div>

        <!-- Join info — shown once a session is active -->
        <div id="join-info" style="display:none;">
          <div class="join-row">
            <div>
              <img id="qr-img" src="" alt="QR code to join" width="96" height="96" />
              <div class="qr-note">QR code is stable — safe to use in slides</div>
            </div>
            <div class="join-links">
              <div class="section-label">Projector view</div>
              <a class="join-url" id="projector-url" href="" target="_blank" rel="noopener" title="Read-only view with QR code and live results — open in your browser for the beamer"></a>
              <div class="section-label join-links__label">Participants join at</div>
              <a class="join-url" id="join-url" href="" target="_blank" rel="noopener" title="Share this URL or the QR code with participants to join the session"></a>
              <div class="section-label join-links__label" id="shortlink-label" style="display:none;">Or via shortlink</div>
              <a class="join-url" id="shortlink-url" href="" target="_blank" rel="noopener" title="Custom shortlink from your config.yaml — make sure it points to the participant join URL above" style="display:none;"></a>
            </div>
          </div>
        </div>
      </section>

      <!-- Question list -->
      <section id="section-questions" style="display:none;">
        <div class="section-label">Questions</div>
        <div class="question-list" id="question-list">
          <!-- populated by JS -->
        </div>
      </section>

      <!-- Active question panel -->
      <section class="card" id="section-active" style="display:none;">
        <div class="active-header">
          <div class="active-question-text" id="active-q-text"></div>
          <span id="status-badge" style="display:none;"></span>
          <span id="stat-answered-badge" style="display:none;" class="badge-live"></span>
        </div>

        <!-- Bar chart -->
        <div class="bar-wrap" id="bar-chart">
          <!-- populated by JS -->
        </div>

        <!-- Explanation (host only) -->
        <div class="meta-line" id="explanation" style="display:none;"></div>

        <!-- Controls -->
        <div class="btn-row">
          <button class="btn-primary" id="btn-activate" onclick="activateQuestion()" title="Open question for voting.">▶ Activate</button>
          <button class="btn-secondary" id="btn-show-answer" onclick="revealAnswer()" title="Stop voting and reveal correct answer(s).">✓ Reveal</button>
          <button class="btn-secondary" id="btn-close" onclick="closeQuestion()" title="Dismiss question, send participants to waiting screen.">✕ Close</button>
          <button class="btn-light" id="btn-next" style="display:none;" onclick="nextQuestion()" title="Go to next question in the list.">Next question →</button>
        </div>
      </section>

    </main>
  </div>

  <footer class="site-footer">
    <a href="impressum" id="footer-impressum">Impressum</a>
    <a href="privacy" id="footer-privacy">Privacy Policy</a>
    __VERSION__
  </footer>

  <script>
    (function() {
      const back = encodeURIComponent(location.href);
      const bp = window.__BASE_PATH__ || '';
      document.getElementById('footer-impressum').href = bp + '/impressum?back=' + back;
      document.getElementById('footer-privacy').href = bp + '/privacy?back=' + back;
    })();
  </script>
  <script src="socket.io/socket.io.js"></script>
  <script src="marked.min.js"></script>
  <script src="katex.min.js"></script>
  <script src="katex-extension.js"></script>
  <script src="purify.min.js"></script>
  <script src="host.js"></script>
</body>
</html>
