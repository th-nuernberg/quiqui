name: CI

on:
  push:
    branches: [main]      # run tests on every push to main
    tags: ['v*']          # publish the Docker image only on a version tag
  pull_request:
    branches: [main]      # run tests on pull requests

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

  build-and-push:
    needs: test
    # Publish only on a version tag (e.g. v1.1.4). Pushes to main and PRs run
    # the tests above but do not build or push an image — a release is an
    # explicit `git tag vX.Y.Z && git push --tags`.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/quiqui:latest
            ghcr.io/${{ github.repository_owner }}/quiqui:${{ github.ref_name }}
