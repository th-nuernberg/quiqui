name: CI

on:
  push:
    branches: [main]      # run tests on every push to main
    tags: ['v*']          # publish the Docker image only on a version tag
  pull_request:
    branches: [main]      # run tests on pull requests

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

  build-and-push:
    needs: test
    # Publish only on a version tag (e.g. v1.1.4). Pushes to main and PRs run
    # the tests above but do not build or push an image — a release is an
    # explicit `git tag vX.Y.Z && git push --tags`.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/quiqui:latest
            ghcr.io/${{ github.repository_owner }}/quiqui:${{ github.ref_name }}

  release:
    needs: build-and-push
    # Create the GitHub Release for the pushed tag, so a `git tag vX.Y.Z`
    # is the single action that both publishes the image and cuts the release.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for auto-generated notes

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Idempotent: skip if a release for this tag already exists (e.g. one
        # was cut manually before the tag reached CI).
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists — skipping."
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi
