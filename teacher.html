<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuiQui — Teacher</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/katex.min.css" />
</head>
<body>

  <div class="page-wrap">
    <header class="top-bar">
      <img src="/quiqui-logo.png" alt="QuiQui" class="logo" id="logo" />
      <span class="top-bar-role">Teacher View</span>
      <a class="top-bar-help" href="https://github.com/albrechtje/quiqui" target="_blank" rel="noopener">Help</a>
    </header>

    <main>

      <!-- Repo + file selection -->
      <section class="card" id="section-repo">
        <div class="section-label">Select a question file</div>
        <div class="file-row">
          <input type="text" id="repo-url" placeholder="https://github.com/you/quiqui-questions" />
          <button class="btn-secondary" id="btn-pull">
            <span class="icon">↻</span> Pull latest
          </button>
        </div>
        <div class="file-row" style="margin-top: 10px;">
          <select id="file-select">
            <option value="">— select a lecture file —</option>
          </select>
        </div>
        <div class="meta-line" id="pull-status"></div>

        <!-- Join info — shown once a session is active -->
        <div id="join-info" style="display:none;">
          <div class="join-row">
            <div>
              <img id="qr-img" src="" alt="QR code to join" width="96" height="96" />
              <div class="qr-note">QR code is stable — safe to use in slides</div>
            </div>
            <div>
              <div class="section-label">Students join at</div>
              <a class="join-url" id="join-url" href="" target="_blank" rel="noopener"></a>
            </div>
          </div>
        </div>
      </section>

      <!-- Question list -->
      <section id="section-questions" style="display:none;">
        <div class="section-label">Questions</div>
        <div class="question-list" id="question-list">
          <!-- populated by JS -->
        </div>
      </section>

      <!-- Active question panel -->
      <section class="card" id="section-active" style="display:none;">
        <div class="active-header">
          <div class="active-question-text" id="active-q-text"></div>
          <span id="status-badge" style="display:none;"></span>
        </div>

        <!-- Live stats -->
        <div class="live-stats" id="live-stats" style="display:none;">
          <div class="stat-card">
            <div class="stat-num" id="stat-answered">0</div>
            <div class="stat-label">answered</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" id="stat-joined">0</div>
            <div class="stat-label">joined</div>
          </div>
        </div>

        <!-- Bar chart -->
        <div class="bar-wrap" id="bar-chart">
          <!-- populated by JS -->
        </div>

        <!-- Correct answer (teacher only) -->
        <div class="meta-line" id="correct-answer" style="display:none;"></div>

        <!-- Controls -->
        <div class="btn-row">
          <button class="btn-primary" id="btn-activate" onclick="activateQuestion()">Activate</button>
          <button class="btn-secondary" id="btn-close" style="display:none;" onclick="closeVoting()">Close voting</button>
          <button class="btn-secondary" id="btn-next" style="display:none;" onclick="nextQuestion()">Next question →</button>
        </div>
      </section>

    </main>
  </div>

  <footer class="site-footer">
    <a href="/impressum" id="footer-impressum">Impressum</a>
    <a href="/privacy" id="footer-privacy">Privacy Policy</a>
  </footer>

  <script>
    (function() {
      const back = encodeURIComponent(location.href);
      document.getElementById('footer-impressum').href = '/impressum?back=' + back;
      document.getElementById('footer-privacy').href = '/privacy?back=' + back;
    })();
  </script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/marked.min.js"></script>
  <script src="/katex.min.js"></script>
  <script src="/katex-extension.js"></script>
  <script src="/teacher.js"></script>
</body>
</html>
