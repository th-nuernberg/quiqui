<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuiQui</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/katex.min.css" />
</head>
<body>

  <div class="page-wrap page-wrap--narrow">
    <header class="top-bar">
      <a href="https://github.com/th-nuernberg/quiqui" target="_blank" rel="noopener" title="QuiQui on GitHub"><img src="/quiqui-logo.png" alt="QuiQui" class="logo" id="logo" /></a>
      <span class="logo-title" id="logo-title"></span>
    </header>

    <main>

      <!-- Waiting screen -->
      <section class="card screen" id="screen-waiting">
        <div class="join-screen-inner">
          <div class="waiting-msg" id="waiting-msg">Waiting for the next question</div>
        </div>
      </section>

      <!-- Question screen -->
      <section class="card screen" id="screen-question" style="display:none;">
        <div class="type-hint" id="type-hint"></div>
        <div class="q-heading" id="student-q-text"></div>
        <div class="answer-list" id="student-answer-list">
          <!-- populated by JS -->
        </div>
        <button class="btn-primary btn-full" id="btn-submit" disabled onclick="submitAnswer()">Submit</button>
        <div class="meta-line" id="student-result-meta" style="display:none;"></div>
      </section>

    </main>
  </div>

  <footer class="site-footer">
    <a href="/impressum" id="footer-impressum">Impressum</a>
    <a href="/privacy" id="footer-privacy">Privacy Policy</a>
  </footer>

  <script>
    (function() {
      const back = encodeURIComponent(location.href);
      document.getElementById('footer-impressum').href = '/impressum?back=' + back;
      document.getElementById('footer-privacy').href = '/privacy?back=' + back;
    })();
  </script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/marked.min.js"></script>
  <script src="/katex.min.js"></script>
  <script src="/katex-extension.js"></script>
  <script src="/purify.min.js"></script>
  <script src="/student.js"></script>
</body>
</html>
